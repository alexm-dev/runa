name: Bug Report
description: File a bug report.
title: "[Bug]: "
labels: ["bug"]
assignees:
  - alexm-dev
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: input
    id: contact
    attributes:
      label: Contact Details
      description: How can we get in touch with you if we need more info?
      placeholder: ex. email@example.com
    validations:
      required: false

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
      value: "A bug happened!"
    validations:
      required: true

  - type: dropdown
    id: version
    attributes:
      label: Version
      description: What version of our software are you running?
      options:
        - v0.10.1 release
        - Git main branch
      default: 0
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: What OS are you using?
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true

  - type: dropdown
    id: architecture
    attributes:
      label: Architecture
      description: What CPU architecture are you using?
      options:
        - x86_64 (x64)
        - ARM64 (aarch64)
    validations:
      required: true

  - type: dropdown
    id: terminal_emulator
    attributes:
      label: Terminal
      description: Which terminal are you using?
      options:
        - Alacritty
        - Kitty
        - WezTerm
        - Ghostty
        - Konsole
        - GNOME Terminal
        - Windows Terminal
        - iTerm
        - Warp
        - st
        - Other / not listed
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output. This will be automatically formatted into code, so no need for backticks.
      render: shell
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Upload screenshots
      description: Drag and drop screenshots here to help explain your problem.
    validations:
      required: false
